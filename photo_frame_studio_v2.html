
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
.app{font-family:'DM Sans',sans-serif;background:var(--color-background-tertiary);}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-tertiary);}
.topbar-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;letter-spacing:0.05em;color:var(--color-text-primary);}
.dl-btn{background:#534AB7;color:#fff;border:none;border-radius:var(--border-radius-md);padding:8px 14px;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px;transition:opacity 0.15s;}
.dl-btn:disabled{opacity:0.4;cursor:not-allowed;}
.dl-btn:not(:disabled):hover{opacity:0.85;}

.preview-wrap{padding:16px;display:flex;justify-content:center;}
.drop-zone{width:100%;max-width:340px;aspect-ratio:3/4;border:1.5px dashed var(--color-border-secondary);border-radius:var(--border-radius-lg);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:border-color 0.2s;background:var(--color-background-secondary);position:relative;overflow:hidden;}
.drop-zone.has-image{border:none;}
.drop-zone:hover{border-color:var(--color-border-primary);}
.drop-hint{color:var(--color-text-secondary);font-size:13px;text-align:center;line-height:2;}
.drop-icon{font-size:28px;color:var(--color-text-tertiary);margin-bottom:6px;display:block;}
#preview-img{width:100%;height:100%;object-fit:cover;display:none;position:absolute;top:0;left:0;}
.frame-ov{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:2;}
#file-input{display:none;}

.panel{background:var(--color-background-primary);border-top:0.5px solid var(--color-border-tertiary);padding:16px;}
.sec-label{font-size:11px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:10px;}

.frame-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px;}
.frame-btn{aspect-ratio:1;border:1.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:var(--color-background-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color 0.15s;overflow:hidden;}
.frame-btn:hover{border-color:var(--color-border-primary);}
.frame-btn.active{border-color:#7F77DD;border-width:2px;}
.frame-btn svg{width:100%;height:100%;}
.frame-label{font-size:10px;color:var(--color-text-secondary);text-align:center;margin-top:4px;}

.color-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
.color-dot{width:30px;height:30px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform 0.15s;}
.color-dot.active{border-color:#7F77DD;transform:scale(1.15);}

.slider-row{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.slider-row label{font-size:13px;color:var(--color-text-secondary);min-width:56px;}
.slider-row input{flex:1;}
.slider-val{font-size:13px;color:var(--color-text-secondary);min-width:32px;text-align:right;}

.msg-section{margin-top:4px;}
.msg-input-wrap{position:relative;margin-bottom:12px;}
.msg-input-wrap textarea{width:100%;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:10px 12px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--color-text-primary);background:var(--color-background-secondary);resize:none;min-height:72px;line-height:1.5;}
.msg-input-wrap textarea::placeholder{color:var(--color-text-tertiary);}
.msg-input-wrap textarea:focus{outline:none;border-color:#7F77DD;}

.msg-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.msg-opt-group{display:flex;flex-direction:column;gap:6px;}
.msg-opt-label{font-size:11px;color:var(--color-text-tertiary);letter-spacing:0.08em;text-transform:uppercase;}
.msg-opt-group select{font-size:13px;padding:6px 8px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-secondary);color:var(--color-text-primary);}
.msg-opt-group select:focus{outline:none;border-color:#7F77DD;}
.msg-color-row{display:flex;gap:6px;flex-wrap:wrap;}
.msg-color-dot{width:22px;height:22px;border-radius:50%;cursor:pointer;border:1.5px solid transparent;transition:transform 0.15s;}
.msg-color-dot.active{border-color:#7F77DD;transform:scale(1.15);}
.pos-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;}
.pos-btn{padding:6px 4px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);font-size:11px;background:var(--color-background-secondary);color:var(--color-text-secondary);cursor:pointer;text-align:center;transition:all 0.15s;}
.pos-btn:hover{border-color:var(--color-border-primary);}
.pos-btn.active{border-color:#7F77DD;background:#EEEDFE;color:#3C3489;}
canvas#export-canvas{display:none;}
</style>

<h2 class="sr-only">写真フレームスタジオ — 写真をアップロードしてフレームとメッセージを追加できます</h2>

<div class="app">
  <div class="topbar">
    <span class="topbar-title">Frame Studio</span>
    <button class="dl-btn" id="dl-btn" disabled>
      <i class="ti ti-download" aria-hidden="true"></i> 保存
    </button>
  </div>

  <div class="preview-wrap">
    <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
      <div id="empty-state">
        <i class="ti ti-photo drop-icon" aria-hidden="true"></i>
        <div class="drop-hint">タップして写真を選択<br>またはドラッグ＆ドロップ</div>
      </div>
      <img id="preview-img" alt="アップロードした写真">
      <div class="frame-ov" id="frame-ov"></div>
    </div>
    <input type="file" id="file-input" accept="image/*">
  </div>

  <div class="panel">
    <p class="sec-label">フレームスタイル</p>
    <div class="frame-grid" id="frame-grid"></div>

    <p class="sec-label">フレームカラー</p>
    <div class="color-row" id="color-row"></div>

    <p class="sec-label">太さ</p>
    <div class="slider-row">
      <input type="range" id="thickness" min="4" max="60" value="20" step="1">
      <span class="slider-val" id="tv">20</span>
    </div>

    <p class="sec-label">角の丸み</p>
    <div class="slider-row">
      <input type="range" id="corner" min="0" max="60" value="0" step="1">
      <span class="slider-val" id="cv">0</span>
    </div>

    <p class="sec-label">メッセージ</p>
    <div class="msg-section">
      <div class="msg-input-wrap">
        <textarea id="msg-text" placeholder="メッセージを入力（例: Happy Birthday! / Thank you）"></textarea>
      </div>
      <div class="msg-opts">
        <div class="msg-opt-group">
          <span class="msg-opt-label">フォント</span>
          <select id="msg-font">
            <option value="'DM Sans',sans-serif">DM Sans</option>
            <option value="'Cormorant Garamond',serif">Cormorant</option>
            <option value="Georgia,serif">Georgia</option>
            <option value="'Courier New',monospace">Courier</option>
          </select>
        </div>
        <div class="msg-opt-group">
          <span class="msg-opt-label">サイズ</span>
          <select id="msg-size">
            <option value="14">小</option>
            <option value="20" selected>中</option>
            <option value="28">大</option>
            <option value="38">特大</option>
          </select>
        </div>
      </div>
      <div class="msg-opts">
        <div class="msg-opt-group">
          <span class="msg-opt-label">文字色</span>
          <div class="msg-color-row" id="msg-color-row"></div>
        </div>
        <div class="msg-opt-group">
          <span class="msg-opt-label">位置</span>
          <div class="pos-grid" id="pos-grid"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<canvas id="export-canvas"></canvas>

<script>
const frames=[
  {id:'simple',label:'シンプル',draw:(ctx,w,h,t,r,c)=>{ctx.fillStyle=c;fb(ctx,w,h,t);}},
  {id:'double',label:'二重線',draw:(ctx,w,h,t,r,c)=>{ctx.fillStyle=c;fb(ctx,w,h,t);ctx.strokeStyle=c;ctx.lineWidth=1.5;const g=Math.max(3,t*.35);ctx.strokeRect(t+g,t+g,w-2*(t+g),h-2*(t+g));}},
  {id:'corner',label:'コーナー',draw:(ctx,w,h,t,r,c)=>{const s=Math.min(w,h)*.18,th=Math.max(2,t*.3);ctx.fillStyle=c;[[0,0,s,0,0,s],[w,0,w-s,0,w,s],[0,h,s,h,0,h-s],[w,h,w-s,h,w,h-s]].forEach(p=>{ctx.beginPath();ctx.moveTo(p[0],p[1]);ctx.lineTo(p[2],p[3]);ctx.lineTo(p[4],p[5]);ctx.closePath();ctx.fill();});ctx.lineWidth=th;ctx.strokeStyle=c;const arm=s*.5;[[t/2,t/2,arm,0],[w-t/2,t/2,0,arm],[t/2,h-t/2,arm,0],[w-t/2,h-t/2,0,arm]].forEach(([x,y,ax,ay])=>{ctx.beginPath();ctx.moveTo(x,y+ay);ctx.lineTo(x,y);ctx.lineTo(x+ax,y);ctx.stroke();});}},
  {id:'film',label:'フィルム',draw:(ctx,w,h,t,r,c)=>{ctx.fillStyle=c;fb(ctx,w,h,t);ctx.fillStyle='rgba(255,255,255,0.25)';const holes=5,hw=t*.35,hh=hw*1.4;for(let i=0;i<holes;i++){const y=t*.5+(i*(h-t))/(holes);ctx.beginPath();ctx.roundRect(t*.15,y-hh/2,hw,hh,2);ctx.fill();ctx.beginPath();ctx.roundRect(w-t*.15-hw,y-hh/2,hw,hh,2);ctx.fill();}}},
  {id:'polaroid',label:'ポラロイド',draw:(ctx,w,h,t,r,c)=>{ctx.fillStyle=c;ctx.fillRect(0,0,w,t);ctx.fillRect(0,0,t,h);ctx.fillRect(w-t,0,t,h);ctx.fillRect(0,h-t*2.8,w,t*2.8);}},
  {id:'botanical',label:'ボタニカル',draw:(ctx,w,h,t,r,c)=>{ctx.fillStyle=c;fb(ctx,w,h,t);ctx.fillStyle='rgba(255,255,255,0.18)';for(let i=0;i<8;i++){const side=i%4,pos=(i<4?i*.25:(i-4)*.25+.125);let x,y;if(side==0){x=w*pos;y=t*.5;}else if(side==1){x=w-t*.5;y=h*pos;}else if(side==2){x=w*(1-pos);y=h-t*.5;}else{x=t*.5;y=h*(1-pos);}lf(ctx,x,y,t*.75,i*45);}}}
];

function fb(ctx,w,h,t){ctx.fillRect(0,0,w,t);ctx.fillRect(0,h-t,w,t);ctx.fillRect(0,0,t,h);ctx.fillRect(w-t,0,t,h);}
function lf(ctx,x,y,size,angle){ctx.save();ctx.translate(x,y);ctx.rotate(angle*Math.PI/180);ctx.beginPath();ctx.ellipse(0,-size/2,size*.3,size/2,0,0,Math.PI*2);ctx.fill();ctx.restore();}

const frameColors=['#2C2C2A','#F1EFE8','#534AB7','#0F6E56','#993C1D','#BA7517','#D4537E','#185FA5'];
const msgColors=['#ffffff','#2C2C2A','#534AB7','#0F6E56','#D4537E','#D85A30','#BA7517','#185FA5'];
const positions=[
  {id:'tl',label:'左上'},{id:'tc',label:'上中'},{id:'tr',label:'右上'},
  {id:'ml',label:'左中'},{id:'mc',label:'中央'},{id:'mr',label:'右中'},
  {id:'bl',label:'左下'},{id:'bc',label:'下中'},{id:'br',label:'右下'},
];

let curFrame='simple',curColor='#2C2C2A',curMsgColor='#ffffff',curPos='bc',hasImg=false;

const grid=document.getElementById('frame-grid');
frames.forEach(f=>{
  const col=document.createElement('div');
  col.style.cssText='display:flex;flex-direction:column;align-items:center;';
  const btn=document.createElement('div');
  btn.className='frame-btn'+(f.id===curFrame?' active':'');
  btn.innerHTML=`<svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"><rect width="60" height="60" fill="#e8e6df" rx="4"/>${thumbSVG(f.id)}</svg>`;
  btn.onclick=()=>{document.querySelectorAll('.frame-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');curFrame=f.id;render();};
  const lbl=document.createElement('div');lbl.className='frame-label';lbl.textContent=f.label;
  col.appendChild(btn);col.appendChild(lbl);grid.appendChild(col);
});

function thumbSVG(id){
  const c='#534AB7',t=8;
  if(id==='simple')return`<rect x="0" y="0" width="60" height="${t}" fill="${c}"/><rect x="0" y="${60-t}" width="60" height="${t}" fill="${c}"/><rect x="0" y="0" width="${t}" height="60" fill="${c}"/><rect x="${60-t}" y="0" width="${t}" height="60" fill="${c}"/>`;
  if(id==='double')return`<rect x="0" y="0" width="60" height="${t}" fill="${c}"/><rect x="0" y="${60-t}" width="60" height="${t}" fill="${c}"/><rect x="0" y="0" width="${t}" height="60" fill="${c}"/><rect x="${60-t}" y="0" width="${t}" height="60" fill="${c}"/><rect x="${t+3}" y="${t+3}" width="${60-2*(t+3)}" height="2" fill="${c}"/><rect x="${t+3}" y="${60-t-5}" width="${60-2*(t+3)}" height="2" fill="${c}"/><rect x="${t+3}" y="${t+3}" width="2" height="${60-2*(t+3)}" fill="${c}"/><rect x="${60-t-5}" y="${t+3}" width="2" height="${60-2*(t+3)}" fill="${c}"/>`;
  if(id==='corner')return`<rect x="0" y="0" width="18" height="4" fill="${c}"/><rect x="0" y="0" width="4" height="18" fill="${c}"/><rect x="42" y="0" width="18" height="4" fill="${c}"/><rect x="56" y="0" width="4" height="18" fill="${c}"/><rect x="0" y="56" width="18" height="4" fill="${c}"/><rect x="0" y="42" width="4" height="18" fill="${c}"/><rect x="42" y="56" width="18" height="4" fill="${c}"/><rect x="56" y="42" width="4" height="18" fill="${c}"/>`;
  if(id==='film')return`<rect x="0" y="0" width="60" height="${t}" fill="${c}"/><rect x="0" y="${60-t}" width="60" height="${t}" fill="${c}"/><rect x="0" y="0" width="${t}" height="60" fill="${c}"/><rect x="${60-t}" y="0" width="${t}" height="60" fill="${c}"/><rect x="2" y="10" width="4" height="7" fill="white" rx="1"/><rect x="2" y="25" width="4" height="7" fill="white" rx="1"/><rect x="2" y="40" width="4" height="7" fill="white" rx="1"/><rect x="54" y="10" width="4" height="7" fill="white" rx="1"/><rect x="54" y="25" width="4" height="7" fill="white" rx="1"/><rect x="54" y="40" width="4" height="7" fill="white" rx="1"/>`;
  if(id==='polaroid')return`<rect x="0" y="0" width="60" height="${t}" fill="${c}"/><rect x="0" y="0" width="${t}" height="60" fill="${c}"/><rect x="${60-t}" y="0" width="${t}" height="60" fill="${c}"/><rect x="0" y="${60-t*2.5}" width="60" height="${t*2.5}" fill="${c}"/>`;
  if(id==='botanical')return`<rect x="0" y="0" width="60" height="${t}" fill="${c}"/><rect x="0" y="${60-t}" width="60" height="${t}" fill="${c}"/><rect x="0" y="0" width="${t}" height="60" fill="${c}"/><rect x="${60-t}" y="0" width="${t}" height="60" fill="${c}"/>`;
  return'';
}

const colorRow=document.getElementById('color-row');
frameColors.forEach(col=>{
  const dot=document.createElement('div');
  dot.className='color-dot'+(col===curColor?' active':'');
  dot.style.background=col;
  if(col==='#F1EFE8')dot.style.border='2px solid var(--color-border-secondary)';
  dot.onclick=()=>{document.querySelectorAll('.color-dot').forEach(d=>{d.classList.remove('active');if(d.dataset.c!=='#F1EFE8')d.style.borderColor='transparent';});dot.classList.add('active');dot.style.borderColor='#7F77DD';curColor=col;render();};
  dot.dataset.c=col;
  colorRow.appendChild(dot);
});

const msgColorRow=document.getElementById('msg-color-row');
msgColors.forEach(col=>{
  const dot=document.createElement('div');
  dot.className='msg-color-dot'+(col===curMsgColor?' active':'');
  dot.style.cssText=`background:${col};${col==='#ffffff'?'border:1.5px solid var(--color-border-secondary);':''}`;
  dot.onclick=()=>{document.querySelectorAll('.msg-color-dot').forEach(d=>{d.classList.remove('active');if(d.dataset.mc!=='#ffffff')d.style.borderColor='transparent';});dot.classList.add('active');dot.style.borderColor='#7F77DD';curMsgColor=col;render();};
  dot.dataset.mc=col;
  msgColorRow.appendChild(dot);
});

const posGrid=document.getElementById('pos-grid');
positions.forEach(p=>{
  const btn=document.createElement('div');
  btn.className='pos-btn'+(p.id===curPos?' active':'');
  btn.textContent=p.label;
  btn.onclick=()=>{document.querySelectorAll('.pos-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');curPos=p.id;render();};
  posGrid.appendChild(btn);
});

document.getElementById('thickness').oninput=e=>{document.getElementById('tv').textContent=e.target.value;render();};
document.getElementById('corner').oninput=e=>{document.getElementById('cv').textContent=e.target.value;render();};
document.getElementById('msg-text').oninput=render;
document.getElementById('msg-font').onchange=render;
document.getElementById('msg-size').onchange=render;

const dz=document.getElementById('drop-zone');
const fi=document.getElementById('file-input');
const pi=document.getElementById('preview-img');
const fo=document.getElementById('frame-ov');
const dlBtn=document.getElementById('dl-btn');

dz.addEventListener('dragover',e=>{e.preventDefault();dz.style.borderColor='#7F77DD';});
dz.addEventListener('dragleave',()=>{dz.style.borderColor='';});
dz.addEventListener('drop',e=>{e.preventDefault();dz.style.borderColor='';const f=e.dataTransfer.files[0];if(f&&f.type.startsWith('image/'))loadImg(f);});
fi.onchange=()=>{if(fi.files[0])loadImg(fi.files[0]);};

function loadImg(file){
  const r=new FileReader();
  r.onload=e=>{pi.src=e.target.result;pi.style.display='block';document.getElementById('empty-state').style.display='none';dz.classList.add('has-image');hasImg=true;dlBtn.disabled=false;pi.onload=()=>render();};
  r.readAsDataURL(file);
}

function drawMsg(ctx,w,h,text,font,size,color,pos,t){
  if(!text.trim())return;
  ctx.font=`${size}px ${font}`;
  ctx.fillStyle=color;
  ctx.textBaseline='middle';

  const lines=text.split('\n');
  const lh=parseInt(size)*1.4;
  const totalH=lines.length*lh;
  const pad=t+12;

  let x,y,align;
  const hPos=pos[1];
  const vPos=pos[0];

  if(hPos==='l'){x=pad;align='left';}
  else if(hPos==='r'){x=w-pad;align='right';}
  else{x=w/2;align='center';}

  if(vPos==='t'){y=pad+totalH/2;}
  else if(vPos==='b'){y=h-pad-totalH/2;}
  else{y=h/2;}

  ctx.textAlign=align;
  lines.forEach((line,i)=>{
    const ly=y+(i-(lines.length-1)/2)*lh;
    ctx.fillStyle='rgba(0,0,0,0.25)';
    ctx.fillText(line,x+1,ly+1);
    ctx.fillStyle=color;
    ctx.fillText(line,x,ly);
  });
}

function render(){
  if(!hasImg)return;
  const w=dz.offsetWidth,h=dz.offsetHeight;
  const t=parseInt(document.getElementById('thickness').value);
  const r=parseInt(document.getElementById('corner').value);
  const frameObj=frames.find(f=>f.id===curFrame);
  const c=document.createElement('canvas');
  c.width=w;c.height=h;
  const ctx=c.getContext('2d');
  frameObj.draw(ctx,w,h,t,r,curColor);

  const msg=document.getElementById('msg-text').value;
  const font=document.getElementById('msg-font').value;
  const size=parseInt(document.getElementById('msg-size').value);
  drawMsg(ctx,w,h,msg,font,size,curMsgColor,curPos,t);

  fo.style.background=`url(${c.toDataURL()}) center/cover`;
}

dlBtn.onclick=()=>{
  const img=new Image();
  img.crossOrigin='anonymous';
  img.onload=()=>{
    const canvas=document.getElementById('export-canvas');
    const naturalW=pi.naturalWidth,naturalH=pi.naturalHeight;
    const scale=Math.min(2000/naturalW,2000/naturalH,1);
    canvas.width=Math.round(naturalW*scale);
    canvas.height=Math.round(naturalH*scale);
    const ctx=canvas.getContext('2d');
    ctx.drawImage(img,0,0,canvas.width,canvas.height);
    const tScale=canvas.width/dz.offsetWidth;
    const t=Math.round(parseInt(document.getElementById('thickness').value)*tScale);
    const r=parseInt(document.getElementById('corner').value);
    frames.find(f=>f.id===curFrame).draw(ctx,canvas.width,canvas.height,t,r,curColor);
    const msg=document.getElementById('msg-text').value;
    const font=document.getElementById('msg-font').value;
    const size=Math.round(parseInt(document.getElementById('msg-size').value)*tScale);
    drawMsg(ctx,canvas.width,canvas.height,msg,font,size,curMsgColor,curPos,t);
    const a=document.createElement('a');
    a.download='framed-photo.png';
    a.href=canvas.toDataURL('image/png');
    a.click();
  };
  img.src=pi.src;
};
</script>
